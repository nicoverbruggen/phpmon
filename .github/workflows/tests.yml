name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project "PHP Monitor.xcodeproj" \
            -scheme "Unit Tests" \
            -destination "platform=macOS" \
            -parallel-testing-enabled NO \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            | xcbeautify

  ui-tests:
    name: UI Tests
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run UI tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project "PHP Monitor.xcodeproj" \
            -scheme "PHP Monitor" \
            -destination "platform=macOS" \
            -only-testing "UI Tests" \
            -parallel-testing-enabled NO \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            | xcbeautify
