name: Unit Tests

on:
  push:
    branches: [main, dev/26.x]
  pull_request:
    branches: [dev/26.x]

jobs:
  unit-tests:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project "PHP Monitor.xcodeproj" \
            -scheme "Unit Tests" \
            -destination "platform=macOS" \
            -parallel-testing-enabled YES \
            -quiet
